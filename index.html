<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perangkat Ajar Kurikulum Merdeka — SMA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --ink:#161B2E;
  --navy:#1D2A4D;
  --navy-2:#2A3A66;
  --paper:#FFFFFF;
  --bg:#EEF1F6;
  --line:#DDE2EC;
  --gold:#B8862E;
  --gold-soft:#F4E8D2;
  --green:#1F6F50;
  --muted:#6B7280;
  --danger:#B3432D;
  --radius:12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{ font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--ink); }
button,input,select,textarea{ font-family:inherit; }

.app{ display:flex; min-height:100vh; background:var(--bg); }

/* ---------- Sidebar ---------- */
.sidebar{
  width:250px; flex-shrink:0; background:linear-gradient(180deg,var(--navy) 0%,#141C36 100%);
  color:#fff; display:flex; flex-direction:column; padding:22px 16px; position:sticky; top:0; height:100vh; z-index:25;
}
.brand{ display:flex; align-items:center; gap:10px; padding:6px 8px 22px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:14px; }
.brand-mark{ width:34px; height:34px; border-radius:9px; background:var(--gold); display:flex; align-items:center; justify-content:center; color:#1a1206; flex-shrink:0;}
.brand-mark svg{ width:19px; height:19px; }
.brand-title{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; line-height:1.15; }
.brand-sub{ font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:.03em; }
.sidebar nav{ display:flex; flex-direction:column; gap:3px; flex:1; overflow-y:auto; }
.nav-item{ display:flex; align-items:center; gap:10px; padding:10px 10px; border:none; background:transparent; color:rgba(255,255,255,0.75); border-radius:9px; cursor:pointer; font-size:13.5px; font-weight:500; text-align:left; width:100%; }
.nav-item svg{ width:17px; height:17px; flex-shrink:0; }
.nav-item span{ flex:1; }
.nav-item .chev{ opacity:0; transition:opacity .15s; width:14px; height:14px; }
.nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.nav-item.active{ background:var(--gold); color:#1a1206; }
.nav-item.active .chev{ opacity:1; }
.sidebar-foot{ font-size:11px; color:rgba(255,255,255,0.4); padding:10px 8px 0; border-top:1px solid rgba(255,255,255,0.12); margin-top:10px; }
.scrim{ position:fixed; inset:0; background:rgba(10,14,28,0.5); z-index:20; }
.mobile-nav-btn{ display:none; }

/* ---------- Main ---------- */
.main{ flex:1; min-width:0; padding:34px 40px 80px; }
.view{ max-width:1000px; margin:0 auto; }
.view-head{ display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:22px; flex-wrap:wrap; }
.eyebrow{ font-size:11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.view h2{ font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin:0 0 8px; color:var(--navy); }
.lead{ color:var(--muted); font-size:14px; max-width:60ch; line-height:1.55; margin:0; }
.view-head-actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

/* ---------- Buttons ---------- */
.btn{ display:inline-flex; align-items:center; gap:7px; border-radius:9px; padding:9px 15px; font-size:13.5px; font-weight:600; border:1px solid transparent; cursor:pointer; }
.btn svg{ width:15px; height:15px; }
.btn-primary{ background:var(--navy); color:#fff; }
.btn-primary:hover{ background:var(--navy-2); }
.btn-outline{ background:#fff; border-color:var(--line); color:var(--navy); margin-top:10px; }
.btn-outline:hover{ border-color:var(--navy); }
.btn-ghost{ background:transparent; border-color:currentColor; color:var(--navy); padding:6px 12px; font-size:12.5px; }
.icon-btn{ border:none; background:#F1F3F8; border-radius:7px; padding:6px; cursor:pointer; display:flex; color:var(--navy); }
.icon-btn svg{ width:15px; height:15px; }
.icon-btn:hover{ background:#e4e8f2; }
.icon-btn.danger{ color:var(--danger); }
.icon-btn.danger:hover{ background:#FBE7E1; }
.icon-btn.xs{ padding:4px; }
.icon-btn.xs svg{ width:12px; height:12px; }

/* ---------- Notice / stats ---------- */
.notice{ display:flex; align-items:center; gap:10px; background:#FFF6E8; border:1px solid var(--gold-soft); color:#6B4E17; padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:22px; }
.notice svg{ width:16px; height:16px; flex-shrink:0; }
.notice b{ font-weight:700; }
.notice .btn{ margin-left:auto; }
.notice-danger{ background:#FBE7E1; border-color:#E3B7A8; color:#7A2E1B; }
.notice-info{ background:#EAF1FB; border-color:#C7D8F0; color:#1D3E6E; }
.notice-ok{ background:#E9F5EF; border-color:#BFE0D0; color:#155C3F; }
.notice-stack{ display:flex; flex-direction:column; gap:10px; }
.notice-stack .notice{ margin-bottom:0; }
.stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:26px; }
.stat-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px; text-align:left; cursor:pointer; color:var(--navy); }
.stat-card:hover{ border-color:var(--navy); }
.stat-card svg{ width:18px; height:18px; }
.stat-value{ font-family:'Fraunces',serif; font-size:26px; font-weight:600; margin:10px 0 2px; }
.stat-label{ font-size:12px; color:var(--muted); }
.module-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.module-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px; text-align:left; cursor:pointer; display:flex; flex-direction:column; gap:8px; }
.module-card:hover{ border-color:var(--navy); box-shadow:0 6px 18px rgba(20,28,54,0.07); }
.module-icon{ width:36px; height:36px; border-radius:9px; background:var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; }
.module-icon svg{ width:19px; height:19px; }
.module-title{ font-weight:700; font-size:15px; color:var(--navy); }
.module-desc{ font-size:12.5px; color:var(--muted); line-height:1.5; flex:1; }
.module-go{ font-size:12.5px; font-weight:700; color:var(--gold); display:flex; align-items:center; gap:2px; }
.module-go svg{ width:14px; height:14px; }

/* ---------- Panel / forms ---------- */
.panel{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:24px; }
.panel-title{ font-weight:700; font-size:13.5px; color:var(--navy); margin-bottom:12px; }
.panel-title.spaced{ margin-top:22px; padding-top:18px; border-top:1px solid var(--line); }
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid.cols-4{ grid-template-columns:repeat(4,1fr); }
.field{ display:flex; flex-direction:column; gap:5px; }
.field-full{ grid-column:1/-1; }
.field-label{ font-size:12px; font-weight:600; color:var(--navy); }
.field-hint{ font-size:11px; color:var(--muted); }
.ti,.ta,.se{ border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:13.5px; color:var(--ink); background:#fff; width:100%; }
.ti:focus,.ta:focus,.se:focus{ outline:2px solid var(--navy-2); outline-offset:1px; border-color:var(--navy-2); }
.ta{ resize:vertical; min-height:38px; line-height:1.4; }
.tiny-hint{ font-size:11.5px; color:var(--muted); margin-top:10px; }

.segmented{ display:flex; background:#fff; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.segmented button{ border:none; background:transparent; padding:8px 14px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; }
.segmented button.active{ background:var(--navy); color:#fff; }

/* ---------- Edit tables ---------- */
.table-wrap{ overflow-x:auto; margin-bottom:6px; }
.edit-table{ border-collapse:collapse; width:100%; min-width:640px; }
.edit-table th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); padding:6px 6px; border-bottom:2px solid var(--line); }
.edit-table td{ padding:5px 6px; vertical-align:top; }
.edit-table .num{ text-align:center; }
.edit-table th.warn{ color:var(--danger); }
.edit-table td.warn-cell{ background:#FBE7E1; border-radius:6px; }
.cell-small{ width:56px; text-align:center; padding:6px 4px; }
.efektif-row td{ background:#F8F9FC; color:var(--navy-2); font-weight:700; font-size:11.5px; padding:6px; border-bottom:2px solid var(--line); }
.efektif-row td.num{ text-align:center; }
.efektif-row .efektif-label{ text-transform:uppercase; letter-spacing:.03em; font-size:10.5px; color:var(--muted); font-weight:700; }
.nilai-cell{ font-weight:700; color:var(--navy); text-align:center; }
.kal-summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:14px 0 18px; }
.kal-summary-card{ background:#F8F9FC; border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
.kal-summary-value{ font-family:'Fraunces',serif; font-size:20px; font-weight:600; color:var(--navy); }
.kal-summary-label{ font-size:11.5px; color:var(--muted); margin-top:2px; }

.kal-month-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:8px; }
.kal-month-card{ background:#F8F9FC; border:1px solid var(--line); border-radius:10px; padding:14px; }
.kal-month-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.kal-month-name{ font-weight:700; font-size:13.5px; color:var(--navy); }
.kal-month-badges{ display:flex; gap:6px; }
.kal-badge{ font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; }
.kal-badge-ok{ background:#E9F5EF; color:#155C3F; }
.kal-badge-off{ background:#FBE7E1; color:#7A2E1B; }
.kal-cal{ border-collapse:collapse; width:100%; table-layout:fixed; }
.kal-cal th{ font-size:9.5px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; color:var(--muted); text-align:center; padding:0 0 4px; }
.kal-cal td{ text-align:center; padding:2px 0; }
.kal-cal tr.kal-week-off td{ background:rgba(179,67,45,0.06); }
.kal-cal tr.kal-week-off td:first-child{ border-radius:6px 0 0 6px; }
.kal-cal tr.kal-week-off td:last-child{ border-radius:0 6px 6px 0; }
.kal-day{ display:flex; align-items:center; justify-content:center; width:26px; height:26px; margin:0 auto; border-radius:7px; font-size:11px; font-weight:600; cursor:pointer; color:var(--ink); background:#fff; border:1px solid var(--line); padding:0; }
.kal-day:hover{ border-color:var(--navy-2); }
.kal-day.spill{ color:var(--muted); background:transparent; border-color:transparent; font-weight:500; }
.kal-day.libur{ background:var(--danger); border-color:var(--danger); color:#fff; }
.kal-month-ket{ margin-top:10px; }

.kegiatan-list, .kriteria-list{ display:flex; flex-direction:column; gap:10px; }
.kegiatan-row{ display:grid; grid-template-columns:130px 1fr 90px 36px; gap:8px; align-items:start; }
.kriteria-row{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr 36px; gap:8px; align-items:start; background:#FAFBFD; border:1px solid var(--line); border-radius:9px; padding:10px; }
.waktu-input{ text-align:center; }

.list-layout{ display:grid; grid-template-columns:220px 1fr; gap:20px; align-items:start; }
.side-list{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:10px; position:sticky; top:20px; }
.side-list-head{ display:flex; justify-content:space-between; align-items:center; font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); padding:6px 6px 10px; }
.side-list-head svg{ width:14px; height:14px; }
.list-item{ display:flex; align-items:center; gap:7px; padding:8px 8px; border-radius:8px; cursor:pointer; font-size:12.5px; color:var(--ink); }
.list-item svg{ width:14px; height:14px; flex-shrink:0; }
.list-item:hover{ background:#F1F3F8; }
.list-item.active{ background:var(--gold-soft); color:#6B4E17; font-weight:700; }
.list-item-title{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.list-item-actions{ display:flex; gap:3px; }

/* ---------- Paper (dokumen cetak) ---------- */
.paper{ background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:46px 50px; box-shadow:0 10px 30px rgba(20,28,54,0.06); color:#111; }
.kop-top{ display:flex; align-items:center; gap:16px; }
.kop-badge{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.06em; color:var(--gold); border:1.5px solid var(--gold); border-radius:8px; padding:8px 10px; text-align:center; line-height:1.5; flex-shrink:0; }
.kop-badge span{ display:block; color:var(--navy); }
.kop-logo{ width:52px; height:52px; object-fit:contain; flex-shrink:0; border-radius:6px; }
.kop-sekolah{ font-family:'Fraunces',serif; font-weight:700; font-size:19px; color:var(--navy); }
.kop-alamat{ font-size:11.5px; color:var(--muted); margin-top:2px; }
.kop-rule{ margin:14px 0 18px; }
.kop-rule .thick{ height:3px; background:var(--navy); }
.kop-rule .thin{ height:1px; background:var(--navy); margin-top:3px; }

.logo-upload{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.logo-preview{ width:76px; height:76px; border:1px dashed var(--line); border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#F8F9FC; flex-shrink:0; }
.logo-preview img{ width:100%; height:100%; object-fit:contain; }
.logo-preview .kop-badge{ margin:0; }
.logo-upload-actions{ display:flex; flex-direction:column; gap:8px; }
.logo-upload-actions input[type=file]{ display:none; }
.doc-title{ text-align:center; margin-bottom:22px; }
.doc-title h1{ font-family:'Fraunces',serif; font-size:18px; letter-spacing:.03em; margin:0 0 4px; color:var(--navy); }
.doc-title p{ font-size:12.5px; color:var(--muted); margin:0; }

.sect{ font-family:'Fraunces',serif; font-size:14.5px; color:var(--navy); border-bottom:1px solid var(--line); padding-bottom:6px; margin:22px 0 10px; }
.paper p{ font-size:12.5px; line-height:1.6; margin:0 0 8px; }
.paper p.pre{ white-space:pre-wrap; background:#F8F9FC; border-radius:7px; padding:9px 11px; }

.info-table{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:10px; }
.info-table td{ border:1px solid var(--line); padding:6px 9px; }
.info-table td:nth-child(odd){ width:150px; font-weight:600; background:#F8F9FC; color:var(--navy); }

.print-table{ width:100%; border-collapse:collapse; font-size:12px; margin-bottom:8px; }
.print-table.small{ font-size:11px; }
.print-table th{ background:var(--navy); color:#fff; font-size:10.5px; text-transform:uppercase; letter-spacing:.02em; padding:7px 8px; text-align:left; }
.print-table td{ border:1px solid var(--line); padding:6px 8px; vertical-align:top; }
.print-table .num{ text-align:center; }
.print-table tfoot td{ border-top:2px solid var(--navy); font-weight:700; background:#F8F9FC; }
.print-table tr.efektif-row td{ background:#F0F3F9; font-weight:700; font-style:italic; color:var(--navy-2); }
.tf-label{ text-align:right; }
.tf-value{ color:var(--navy); }

.sign-block{ display:flex; justify-content:space-between; margin-top:40px; gap:20px; }
.sign-col{ font-size:12.5px; text-align:center; width:230px; }
.sign-space{ height:56px; }
.sign-name{ font-weight:700; text-decoration:underline; margin:0; }
.sign-nip{ margin:2px 0 0; color:var(--muted); }
.qr-wrap{ display:flex; flex-direction:column; align-items:center; gap:3px; margin:8px 0; }
.qr-img{ width:76px; height:76px; display:block; }
.qr-code-txt{ font-family:'JetBrains Mono',monospace; font-size:8.5px; color:var(--muted); letter-spacing:.02em; }
.qr-empty{ display:flex; align-items:center; justify-content:center; height:56px; border:1px dashed var(--line); border-radius:8px; font-size:10px; color:var(--muted); text-align:center; padding:0 8px; }
.ttd-actions{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:6px; }
.ttd-status{ font-size:12px; color:var(--muted); }
.ttd-status b{ color:var(--green); }

/* ---------- Toast ---------- */
.toast{ position:fixed; bottom:22px; right:22px; background:var(--navy); color:#fff; padding:9px 16px; border-radius:9px; font-size:12.5px; display:flex; align-items:center; gap:7px; box-shadow:0 8px 22px rgba(0,0,0,0.2); z-index:40; opacity:0; transform:translateY(6px); transition:opacity .2s, transform .2s; pointer-events:none; }
.toast svg{ width:14px; height:14px; }
.toast.show{ opacity:1; transform:translateY(0); }

/* ---------- Responsive ---------- */
@media (max-width:980px){
  .form-grid, .form-grid.cols-4{ grid-template-columns:1fr; }
  .stat-grid{ grid-template-columns:repeat(2,1fr); }
  .module-grid{ grid-template-columns:1fr; }
  .list-layout{ grid-template-columns:1fr; }
}
@media (max-width:760px){
  .sidebar{ position:fixed; left:-260px; z-index:30; transition:left .2s; top:0; }
  .sidebar.open{ left:0; }
  .mobile-nav-btn{ display:flex; position:fixed; top:16px; left:16px; z-index:15; background:var(--navy); color:#fff; border:none; border-radius:9px; padding:9px; }
  .mobile-nav-btn svg{ width:18px; height:18px; }
  .main{ padding:70px 16px 60px; }
  .paper{ padding:26px 20px; }
  .kegiatan-row, .kriteria-row{ grid-template-columns:1fr; }
}

/* ---------- Print ---------- */
.kalender-semester-page + .kalender-semester-page{ margin-top:36px; padding-top:32px; border-top:2px dashed var(--line); }
@media print{
  @page{ size:A4; margin:14mm; }
  body *{ visibility:hidden; }
  .print-area, .print-area *{ visibility:visible; }
  .print-area{ position:absolute; top:0; left:0; width:100%; box-shadow:none; border:none; padding:0; }
  .no-print{ display:none !important; }
  body{ background:#fff; }
  .kalender-semester-page + .kalender-semester-page{ margin-top:0; padding-top:0; border-top:none; page-break-before:always; break-before:page; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ============================== KONSTANTA ============================== */

const STORAGE_KEY = 'km-app-data-sma-v1';

const BULAN_GANJIL = ['Juli','Agustus','September','Oktober','November','Desember'];
const BULAN_GENAP  = ['Januari','Februari','Maret','April','Mei','Juni'];
const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTH_IDX = { Januari:0, Februari:1, Maret:2, April:3, Mei:4, Juni:5, Juli:6, Agustus:7, September:8, Oktober:9, November:10, Desember:11 };
const HARI_SINGKAT = ['Sen','Sel','Rab','Kam','Jum','Sab'];
const FASE_OPTIONS = ['A','B','C','D','E','F'];
const LEVEL_KOGNITIF = ['C1 - Mengingat','C2 - Memahami','C3 - Menerapkan','C4 - Menganalisis','C5 - Mengevaluasi','C6 - Mencipta'];
const BENTUK_SOAL = ['Pilihan Ganda','Uraian','Isian Singkat','Menjodohkan','Benar - Salah'];
const JENIS_PENILAIAN_UJIAN = ['Sumatif Akhir Semester','Sumatif Tengah Semester','Sumatif Lingkup Materi','Asesmen Formatif'];
const JENIS_RUBRIK = ['Kinerja','Proyek','Produk','Portofolio','Presentasi','Praktik'];

const uid = () => Math.random().toString(36).slice(2, 10);

function todayID(){
  const d = new Date();
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return d.getDate() + ' ' + bulan[d.getMonth()] + ' ' + d.getFullYear();
}

function esc(s){
  return (s === null || s === undefined ? '' : String(s))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nl2br(s){ return esc(s).replace(/\n/g,'<br/>'); }

/* ============================== ICONS ============================== */

const ICON = {
  menu: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>',

/* ============================== STATE ============================== */

let STATE = defaultData();
let ACTIVE = 'dashboard';
let ACTIVE_MODUL_ID = null;
let ACTIVE_RUBRIK_ID = null;
let SEMESTER = 'Ganjil';
let KAL_SEMESTER = 'Ganjil';
let saveTimer = null;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      STATE = Object.assign(defaultData(), parsed);
      STATE.identitas = Object.assign(defaultIdentitas(), STATE.identitas || {});
      STATE.kalender = Object.assign(defaultKalender(), STATE.kalender || {});
      if (Array.isArray(STATE.promes)){
        // Migrasi data lama: satu daftar Promes dipisah menjadi Ganjil & Genap.
        // Baris dengan isi JP di bulan-bulan Ganjil masuk daftar Ganjil, begitu pula Genap.
        // Baris yang berisi keduanya akan disalin ke kedua daftar; baris kosong masuk ke Ganjil.
        const legacy = STATE.promes;
        const ganjil = [], genap = [];
        legacy.forEach(r => {
          const bulan = r.bulan || {};
          const isiGanjil = BULAN_GANJIL.some(b => (parseInt(bulan[b])||0) > 0);
          const isiGenap = BULAN_GENAP.some(b => (parseInt(bulan[b])||0) > 0);
          const bGanjil = {}; BULAN_GANJIL.forEach(b => { if (bulan[b]!==undefined) bGanjil[b]=bulan[b]; });
          const bGenap = {}; BULAN_GENAP.forEach(b => { if (bulan[b]!==undefined) bGenap[b]=bulan[b]; });
          if (isiGenap && !isiGanjil){
            genap.push(Object.assign({}, r, { bulan: bGenap }));
          } else if (isiGanjil && isiGenap){
            ganjil.push(Object.assign({}, r, { id: uid(), bulan: bGanjil }));
            genap.push(Object.assign({}, r, { id: uid(), bulan: bGenap }));
          } else {
            ganjil.push(Object.assign({}, r, { bulan: bGanjil }));
          }
        });
        STATE.promes = {
          Ganjil: ganjil.length ? ganjil : [emptyPromesRow()],
          Genap: genap.length ? genap : [emptyPromesRow()],
        };
      }
      STATE.promes = Object.assign({ Ganjil:[emptyPromesRow()], Genap:[emptyPromesRow()] }, STATE.promes || {});
      if (!Array.isArray(STATE.promes.Ganjil) || STATE.promes.Ganjil.length === 0) STATE.promes.Ganjil = [emptyPromesRow()];
      if (!Array.isArray(STATE.promes.Genap) || STATE.promes.Genap.length === 0) STATE.promes.Genap = [emptyPromesRow()];
      if (!STATE.kalender.libur || typeof STATE.kalender.libur !== 'object') STATE.kalender.libur = {};
      ['Ganjil','Genap'].forEach(sem => {
        const list = sem === 'Ganjil' ? BULAN_GANJIL : BULAN_GENAP;
        STATE.kalender[sem] = STATE.kalender[sem] || {};
        list.forEach(b => { STATE.kalender[sem][b] = Object.assign(emptyKalenderBulan(), STATE.kalender[sem][b] || {}); });
      });
    }
  }catch(e){ console.warn('Gagal memuat data tersimpan, memakai data default.', e); }
}
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
      showToast('Tersimpan');
    }catch(e){ console.warn('Penyimpanan lokal tidak tersedia.', e); }
  }, 350);
}

  const t = document.getElementById('toast');

}

/* ---- Tanda Tangan Elektronik (QR) ---- */
function fnv1a(str){
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return (h >>> 0).toString(16).toUpperCase().padStart(8, '0');
}
function ttdWaktu(role){ return role === 'guru' ? STATE.identitas.waktuTtdGuru : STATE.identitas.waktuTtdKepsek; }
function ttdTanggal(role){ return (role === 'guru' ? STATE.identitas.tglTtdGuru : STATE.identitas.tglTtdKepsek) || STATE.identitas.tanggal; }
function ttdHash(role, docTitle){
  const id = STATE.identitas;
  const nama = role === 'guru' ? id.guru : id.kepsek;
  const raw = [nama, id.mapel, id.namaSekolah, ttdTanggal(role), ttdWaktu(role), docTitle, 'SKM-2026'].join('|');
  return fnv1a(raw);
}
function ttdQrText(role, docTitle){
  const id = STATE.identitas;
  const nama = role === 'guru' ? id.guru : id.kepsek;
  const jabatan = role === 'guru' ? 'Guru Mata Pelajaran' : 'Kepala Sekolah';
  return [
    'TANDA TANGAN ELEKTRONIK (INTERNAL SEKOLAH)',
    'Dokumen  : ' + docTitle,
    'Nama     : ' + (nama || '-'),
    'Jabatan  : ' + jabatan,
    'Mapel    : ' + (id.mapel || '-'),
    'Sekolah  : ' + (id.namaSekolah || '-'),
    'Tanggal  : ' + (ttdTanggal(role) || '-'),
    'Waktu    : ' + (ttdWaktu(role) || '-') + ' WIB',
    'Kode Verifikasi : ' + ttdHash(role, docTitle),
    '',
    'Kode verifikasi adalah checksum internal aplikasi untuk mendeteksi perubahan data pada tanda tangan ini. Bukan sertifikat elektronik tersertifikasi (bukan BSrE/PSrE).'
  ].join('\n');
}
function signQrHtml(role, docTitle){
  const waktu = ttdWaktu(role);
  if (!waktu){
    return '<div class="qr-empty"></div>';
  }
  const url = 'https://api.qrserver.com/v1/create-qr-code/?size=130x130&ecc=M&margin=6&data=' + encodeURIComponent(ttdQrText(role, docTitle));
  return '<div class="qr-wrap">' +
    '<img class="qr-img" src="' + url + '" alt="QR Tanda Tangan Elektronik" />' +
  '</div>';
}

function onLogoUpload(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  if (!file.type || file.type.indexOf('image/') !== 0){
    alert('Berkas harus berupa gambar (PNG, JPG, atau SVG).');
    inputEl.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const maxDim = 320;
      let w = img.width || maxDim, h = img.height || maxDim;
      if (w > maxDim || h > maxDim){
        if (w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      let dataUrl;
      try{ dataUrl = canvas.toDataURL('image/png'); }
      catch(err){ alert('Gagal memproses gambar. Coba gambar lain.'); return; }
      STATE.identitas.logo = dataUrl;
      save(); renderView(); refreshAllPapers();
    };
    img.onerror = function(){ alert('Gagal membaca gambar. Coba berkas lain.'); };
    img.src = e.target.result;
  };
  reader.onerror = function(){ alert('Gagal membaca berkas.'); };
  reader.readAsDataURL(file);
}
function onLogoRemove(){
  STATE.identitas.logo = '';
  save(); renderView(); refreshAllPapers();

/* ---------- Tahun ajaran & minggu kalender ---------- */

function tapelYears(){
  const t = (STATE.identitas && STATE.identitas.tapel) || '';
  const m = /(\d{4})\s*\/\s*(\d{4})/.exec(t);
  if (m) return [parseInt(m[1],10), parseInt(m[2],10)];
  const y = new Date().getFullYear();
  return [y, y+1];
}
function kalenderBulanTahun(sem, bulan){
  const [y1,y2] = tapelYears();
  return sem === 'Ganjil' ? y1 : y2;
}
function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function tglKey(y, m, d){ return y + '-' + pad2(m+1) + '-' + pad2(d); }

// Membangun daftar minggu (Senin–Sabtu, 6 hari sekolah) yang "dimiliki" oleh sebuah bulan,
// yaitu minggu-minggu yang hari Senin-nya jatuh pada bulan & tahun tersebut.
function buildMonthWeeks(sem, bulan){
  const year = kalenderBulanTahun(sem, bulan);
  const monthIdx = MONTH_IDX[bulan];
  const first = new Date(year, monthIdx, 1);
  const offset = (first.getDay() + 6) % 7; // jarak dari Senin (0=Senin ... 6=Minggu)
  let cursor = new Date(year, monthIdx, 1 - offset);
  if (cursor.getMonth() !== monthIdx || cursor.getFullYear() !== year){
    cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + 7);
  }
  const weeks = [];
  while (cursor.getMonth() === monthIdx && cursor.getFullYear() === year){
    const week = [];
    for (let i = 0; i < 6; i++){ // Senin..Sabtu
      const d = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + i);
      week.push({
        y: d.getFullYear(), m: d.getMonth(), d: d.getDate(),
        inMonth: d.getMonth() === monthIdx && d.getFullYear() === year,
        key: tglKey(d.getFullYear(), d.getMonth(), d.getDate()),
      });
    }
    weeks.push(week);
    cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + 7);
  }
  return weeks;
}
function isLiburTgl(key){ return !!(STATE.kalender.libur && STATE.kalender.libur[key]); }
function weekIsEfektif(week){ return !week.some(d => isLiburTgl(d.key)); } // tidak efektif jika ADA min. 1 hari libur

function kalenderBulanEfektif(sem, b){
  return buildMonthWeeks(sem, b).filter(weekIsEfektif).length;
}
function kalenderBulanTidak(sem, b){
  const weeks = buildMonthWeeks(sem, b);
  return weeks.length - weeks.filter(weekIsEfektif).length;
}
function kalenderTotalEfektif(sem){
  const list = sem === 'Ganjil' ? BULAN_GANJIL : BULAN_GENAP;
  return list.reduce((a,b) => a + kalenderBulanEfektif(sem,b), 0);
}
function kalenderTotalTidak(sem){
  const list = sem === 'Ganjil' ? BULAN_GANJIL : BULAN_GENAP;
  return list.reduce((a,b) => a + kalenderBulanTidak(sem,b), 0);
}
function kalenderJP(sem){
  return kalenderTotalEfektif(sem) * (parseInt(STATE.kalender.jpPerMinggu)||0);
}

  const weeks = buildMonthWeeks(sem, bulan);

/* ---------- Validasi otomatis terhadap Kalender Pendidikan ---------- */

function warningsHtml(warnings){
  if (!warnings || !warnings.length) return '';
  const cls = { danger:'notice notice-danger', info:'notice notice-info', ok:'notice notice-ok' };
  return '<div class="notice-stack no-print">' + warnings.map(w =>
    '<div class="' + (cls[w.type]||'notice') + '">' + ICON.alert + '<span>' + esc(w.text) + '</span></div>'
  ).join('') + '</div>';
}
function protaWarnings(rows){
  const warnings = [];
  ['Ganjil','Genap'].forEach(sem => {
    const total = rows.filter(r => r.semester === sem).reduce((a,r) => a + (parseInt(r.alokasi)||0), 0);
    if (total <= 0) return;
    const efektif = kalenderTotalEfektif(sem);
    const avail = kalenderJP(sem);
    if (efektif === 0){
      warnings.push({ type:'info', text:'Kalender Pendidikan Semester ' + sem + ' belum diisi, sehingga alokasi ' + total + ' JP pada semester ini belum dapat diperiksa kesesuaiannya. Lengkapi di menu Kalender Pendidikan.' });
    } else if (total > avail){
      warnings.push({ type:'danger', text:'Alokasi JP Semester ' + sem + ' (' + total + ' JP) melebihi JP tersedia menurut Kalender Pendidikan (' + avail + ' JP dari ' + efektif + ' minggu efektif × ' + (parseInt(STATE.kalender.jpPerMinggu)||0) + ' JP/minggu). Kurangi alokasi atau perbarui Kalender Pendidikan.' });
    }
  });
  return warnings;
}
function promesWarnings(sem, bulanList, rows){
  const warnings = [];
  const efektifSem = kalenderTotalEfektif(sem);
  const jpMinggu = parseInt(STATE.kalender.jpPerMinggu)||0;
  const monthsOver = [];
  bulanList.forEach(b => {
    const total = rows.reduce((a,r) => a + (parseInt(r.bulan[b])||0), 0);
    if (total <= 0) return;
    const bEfektif = kalenderBulanEfektif(sem, b);
    const bAvail = bEfektif * jpMinggu;
    if (efektifSem === 0) return;
    if (bEfektif === 0){
      warnings.push({ type:'danger', text:'Bulan ' + b + ' pada Kalender Pendidikan tercatat 0 minggu efektif, namun Program Semester mengalokasikan ' + total + ' JP pada bulan tersebut.' });
      monthsOver.push(b);
    } else if (total > bAvail){
      warnings.push({ type:'danger', text:'Alokasi bulan ' + b + ' (' + total + ' JP) melebihi kapasitas efektif kalender (' + bAvail + ' JP dari ' + bEfektif + ' minggu efektif).' });
      monthsOver.push(b);
    }
  });
  if (efektifSem === 0){
    const anyIsi = rows.some(r => bulanList.some(b => (parseInt(r.bulan[b])||0) > 0));
    if (anyIsi) warnings.unshift({ type:'info', text:'Kalender Pendidikan Semester ' + sem + ' belum diisi, sehingga alokasi bulanan belum dapat diperiksa kesesuaiannya. Lengkapi di menu Kalender Pendidikan.' });
  }
  warnings.monthsOver = monthsOver;
  return warnings;
}

function viewProta(){
  const rows = STATE.prota;

function duplicateModul(id){

    '<td><input class="ti" type="number" min="0" max="100" value="' + esc(r.dayaDukung) + '" oninput="onKktpChange(\'' + r.id + '\',\'dayaDukung\',this.value)" /></td>' +
    '<td><input class="ti" type="number" min="0" max="100" value="' + esc(r.intake) + '" oninput="onKktpChange(\'' + r.id + '\',\'intake\',this.value)" /></td>' +
    '<td class="nilai-cell" id="kktp-nilai-' + r.id + '">' + kktpNilai(r) + '</td>' +
    '<td><button class="icon-btn danger" onclick="delKktpRow(\'' + r.id + '\')">' + ICON.trash + '</button></td>' +
  '</tr>';
}
function kktpPaperHtml(){
  const id = STATE.identitas, rows = STATE.kktp;
  const nilaiList = rows.map(kktpNilai);
  const rata = nilaiList.length ? Math.round((nilaiList.reduce((a,b)=>a+b,0) / nilaiList.length) * 10) / 10 : 0;
  return kopHtml('ANALISIS KKTP (KRITERIA KETERCAPAIAN TUJUAN PEMBELAJARAN)', 'Mata Pelajaran: ' + (id.mapel||'-') + ' · Fase ' + id.fase + ' / Kelas ' + id.kelas + ' · TA ' + id.tapel) +
    '<table class="print-table"><thead><tr><th>No</th><th>Capaian Kompetensi</th><th>Tujuan Pembelajaran</th><th>Kompleksitas</th><th>Daya Dukung</th><th>Intake</th><th>Nilai</th><th>Kategori</th></tr></thead><tbody>' +
    rows.map((r,i) => { const n = kktpNilai(r); return '<tr><td class="num">' + (i+1) + '</td><td>' + nl2br(r.capaian) + '</td><td>' + nl2br(r.tujuan) + '</td><td class="num">' + esc(r.kompleksitas) + '</td><td class="num">' + esc(r.dayaDukung) + '</td><td class="num">' + esc(r.intake) + '</td><td class="num">' + n + '</td><td>' + kategoriKktp(n) + '</td></tr>'; }).join('') +
    '</tbody><tfoot><tr><td colspan="6" class="tf-label">Rata-rata KKTP Mata Pelajaran</td><td class="num tf-value">' + rata + '</td><td>' + kategoriKktp(rata) + '</td></tr></tfoot></table>' +
    signBlockHtml('ANALISIS KKTP');
}
function onKktpChange(id, key, val){
  const r = STATE.kktp.find(x => x.id === id); if (!r) return;
  r[key] = val; save();
  const cell = document.getElementById('kktp-nilai-' + id);
  if (cell) cell.textContent = kktpNilai(r);
  refreshPreview('kktp-paper');
}
function addKktpRow(){ STATE.kktp.push(emptyKktpRow()); save(); renderView(); }
function delKktpRow(id){ STATE.kktp = STATE.kktp.filter(r => r.id !== id); save(); renderView(); }

/* ============================== KISI-KISI SOAL ============================== */

function viewKisi(){
  const h = STATE.kisiHeader, rows = STATE.kisi;
  return '<div class="view">' +
    viewHead('Dokumen 6','Kisi-Kisi Soal','Susun kisi-kisi ujian jenjang SMA: materi, indikator soal, level kognitif, bentuk soal, dan sebaran nomor.') +
    '<div class="panel no-print">' +
      '<div class="panel-title">Informasi Ujian</div>' +
      '<div class="form-grid cols-4">' +
        field('Jenis Penilaian', selectHtml(JENIS_PENILAIAN_UJIAN, h.jenisPenilaian, "onKisiHeaderChange('jenisPenilaian',this.value)")) +
        field('Bentuk Ujian', '<input class="ti" value="' + esc(h.bentukUjian) + '" oninput="onKisiHeaderChange(\'bentukUjian\',this.value)" />') +
        field('Alokasi Waktu', '<input class="ti" value="' + esc(h.waktuUjian) + '" oninput="onKisiHeaderChange(\'waktuUjian\',this.value)" />') +
        field('Jumlah Soal', '<input class="ti" type="number" value="' + esc(h.jumlahSoal) + '" oninput="onKisiHeaderChange(\'jumlahSoal\',this.value)" />') +
      '</div>' +
      '<div class="panel-title spaced">Butir Kisi-Kisi</div>' +
      '<div class="table-wrap"><table class="edit-table"><thead><tr>' +
        '<th style="width:32px">No</th><th>Elemen</th><th>Tujuan Pembelajaran</th><th>Indikator Soal</th>' +
        '<th style="width:150px">Level Kognitif</th><th style="width:130px">Bentuk Soal</th><th style="width:60px">Jml</th><th style="width:70px">No. Soal</th><th style="width:36px"></th>' +
      '</tr></thead><tbody id="kisi-tbody">' + rows.map((r,i) => kisiRowHtml(r,i)).join('') + '</tbody></table></div>' +
      '<button class="btn btn-outline" onclick="addKisiRow()">' + ICON.plus + ' Tambah Baris</button>' +
    '</div>' +
    '<div class="paper print-area" id="kisi-paper">' + kisiPaperHtml() + '</div>' +
  '</div>';
}
function kisiRowHtml(r,i){
  return '<tr id="kisi-row-' + r.id + '">' +
    '<td class="num">' + (i+1) + '</td>' +
    '<td><textarea class="ta" rows="2" oninput="onKisiChange(\'' + r.id + '\',\'materi\',this.value)">' + esc(r.materi) + '</textarea></td>' +
    '<td><textarea class="ta" rows="2" placeholder="Peserta didik mampu..." oninput="onKisiChange(\'' + r.id + '\',\'tujuan\',this.value)">' + esc(r.tujuan) + '</textarea></td>' +
    '<td><textarea class="ta" rows="2" placeholder="Disajikan..., peserta didik dapat..." oninput="onKisiChange(\'' + r.id + '\',\'indikator\',this.value)">' + esc(r.indikator) + '</textarea></td>' +
    '<td>' + selectHtml(LEVEL_KOGNITIF, r.level, "onKisiChange('" + r.id + "','level',this.value)") + '</td>' +
    '<td>' + selectHtml(BENTUK_SOAL, r.bentuk, "onKisiChange('" + r.id + "','bentuk',this.value)") + '</td>' +
    '<td><input class="ti cell-small" type="number" value="' + esc(r.jml) + '" oninput="onKisiChange(\'' + r.id + '\',\'jml\',this.value)" /></td>' +
    '<td><input class="ti cell-small" value="' + esc(r.nomor) + '" oninput="onKisiChange(\'' + r.id + '\',\'nomor\',this.value)" /></td>' +
    '<td><button class="icon-btn danger" onclick="delKisiRow(\'' + r.id + '\')">' + ICON.trash + '</button></td>' +
  '</tr>';
}
function kisiPaperHtml(){
  const id = STATE.identitas, h = STATE.kisiHeader, rows = STATE.kisi;
  return kopHtml('KISI-KISI SOAL', (id.mapel||'-') + ' · Fase ' + id.fase + ' / Kelas ' + id.kelas + ' · TA ' + id.tapel) +
    '<table class="info-table"><tbody>' +
      '<tr><td>Jenis Penilaian</td><td>' + esc(h.jenisPenilaian) + '</td><td>Bentuk Ujian</td><td>' + esc(h.bentukUjian) + '</td></tr>' +
      '<tr><td>Alokasi Waktu</td><td>' + esc(h.waktuUjian) + '</td><td>Jumlah Soal</td><td>' + esc(h.jumlahSoal) + '</td></tr>' +
    '</tbody></table>' +
    '<table class="print-table small"><thead><tr><th>No</th><th>Elemen</th><th>Tujuan Pembelajaran</th><th>Indikator Soal</th><th>Level</th><th>Bentuk</th><th>Jml</th><th>No. Soal</th></tr></thead><tbody>' +
    rows.map((r,i) => '<tr><td class="num">' + (i+1) + '</td><td>' + nl2br(r.materi) + '</td><td>' + nl2br(r.tujuan) + '</td><td>' + nl2br(r.indikator) + '</td><td>' + esc(r.level) + '</td><td>' + esc(r.bentuk) + '</td><td class="num">' + esc(r.jml) + '</td><td class="num">' + esc(r.nomor) + '</td></tr>').join('') +
    '</tbody></table>' + signBlockHtml('KISI-KISI SOAL');
}
function onKisiHeaderChange(key, val){ STATE.kisiHeader[key] = val; save(); refreshPreview('kisi-paper'); }
function onKisiChange(id, key, val){
  const r = STATE.kisi.find(x => x.id === id); if (!r) return;
  r[key] = val; save(); refreshPreview('kisi-paper');
}
function addKisiRow(){ STATE.kisi.push(emptyKisiRow()); save(); renderView(); }
function delKisiRow(id){ STATE.kisi = STATE.kisi.filter(r => r.id !== id); save(); renderView(); }

/* ============================== RUBRIK PENILAIAN ============================== */

function viewRubrik(){
  const list = STATE.rubrikList;
  if (!ACTIVE_RUBRIK_ID || !list.find(r => r.id === ACTIVE_RUBRIK_ID)) ACTIVE_RUBRIK_ID = list[0].id;
  const rub = list.find(r => r.id === ACTIVE_RUBRIK_ID);

  return '<div class="view">' +
    viewHead('Dokumen 7','Rubrik Penilaian','Susun rubrik penilaian kinerja, proyek, produk, atau presentasi dengan deskriptor tiap level skor.') +
    '<div class="list-layout">' +
      '<div class="side-list no-print">' +
        '<div class="side-list-head"><span>Daftar Rubrik</span><button class="icon-btn" onclick="addRubrik()">' + ICON.plus + '</button></div>' +
        '<div id="rubrik-list-items">' + list.map(r => rubrikListItemHtml(r)).join('') + '</div>' +
      '</div>' +
      '<div class="modul-main">' +
        '<div id="rubrik-editor">' + rubrikEditorHtml(rub) + '</div>' +
        '<div class="paper print-area" id="rubrik-paper">' + rubrikPaperHtml(rub) + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}
function rubrikListItemHtml(r){
  const active = r.id === ACTIVE_RUBRIK_ID;
  return '<div class="list-item ' + (active?'active':'') + '" onclick="selectRubrik(\'' + r.id + '\')">' + ICON.rubric +
    '<span class="list-item-title">' + esc(r.judul || 'Tanpa judul') + '</span>' +
    '<div class="list-item-actions">' +
      '<button class="icon-btn xs" title="Duplikat" onclick="event.stopPropagation(); duplicateRubrik(\'' + r.id + '\')">' + ICON.copy + '</button>' +
      (STATE.rubrikList.length > 1 ? '<button class="icon-btn xs danger" title="Hapus" onclick="event.stopPropagation(); delRubrik(\'' + r.id + '\')">' + ICON.trash + '</button>' : '') +
    '</div></div>';
}
function rubrikEditorHtml(r){
  return '<div class="panel no-print">' +
    '<div class="panel-title">Judul Rubrik</div>' +
    '<input class="ti" value="' + esc(r.judul) + '" placeholder="Rubrik Penilaian Presentasi Kelompok" oninput="onRubrikChange(\'judul\',this.value)" />' +
    '<div class="form-grid" style="margin-top:14px">' +
      field('Jenis Penilaian', selectHtml(JENIS_RUBRIK, r.jenisPenilaian, "onRubrikChange('jenisPenilaian',this.value)")) +
      field('Nama Tugas / Aktivitas', '<input class="ti" value="' + esc(r.tugas) + '" oninput="onRubrikChange(\'tugas\',this.value)" />') +
      field('Petunjuk Penskoran', '<input class="ti" value="' + esc(r.petunjuk) + '" oninput="onRubrikChange(\'petunjuk\',this.value)" />', true) +
    '</div>' +
    '<div class="panel-title spaced">Kriteria &amp; Deskriptor</div>' +
    '<div class="kriteria-list" id="kriteria-list">' + r.kriteria.map(k => kriteriaRowHtml(k)).join('') + '</div>' +
    '<button class="btn btn-outline" onclick="addKriteria()">' + ICON.plus + ' Tambah Kriteria</button>' +
  '</div>';
}
function kriteriaRowHtml(k){
  const cell = (label, key, val) => '<div class="field"><span class="field-label">' + label + '</span>' +
    '<textarea class="ta" rows="3" oninput="onKriteriaChange(\'' + k.id + '\',\'' + key + '\',this.value)">' + esc(val) + '</textarea></div>';
  return '<div class="kriteria-row" id="krit-' + k.id + '">' +
    '<div class="field"><span class="field-label">Aspek Penilaian</span><textarea class="ta" rows="3" oninput="onKriteriaChange(\'' + k.id + '\',\'aspek\',this.value)">' + esc(k.aspek) + '</textarea></div>' +
    cell('Skor 4 (Sangat Baik)','s4',k.s4) +
    cell('Skor 3 (Baik)','s3',k.s3) +
    cell('Skor 2 (Cukup)','s2',k.s2) +
    cell('Skor 1 (Perlu Bimbingan)','s1',k.s1) +
    '<button class="icon-btn danger" onclick="delKriteria(\'' + k.id + '\')" style="align-self:start">' + ICON.trash + '</button>' +
  '</div>';
}
function rubrikPaperHtml(r){
  const id = STATE.identitas;
  return kopHtml('RUBRIK PENILAIAN', r.judul + ' · ' + r.jenisPenilaian) +
    '<table class="info-table"><tbody>' +
      '<tr><td>Mata Pelajaran</td><td>' + esc(id.mapel||'-') + '</td><td>Kelas</td><td>' + esc(id.kelas) + '</td></tr>' +
      '<tr><td>Nama Tugas/Aktivitas</td><td colspan="3">' + esc(r.tugas||'-') + '</td></tr>' +
    '</tbody></table>' +
    '<table class="print-table small"><thead><tr><th>Aspek Penilaian</th><th>Skor 4<br/>Sangat Baik</th><th>Skor 3<br/>Baik</th><th>Skor 2<br/>Cukup</th><th>Skor 1<br/>Perlu Bimbingan</th></tr></thead><tbody>' +
    r.kriteria.map(k => '<tr><td><b>' + nl2br(k.aspek) + '</b></td><td>' + nl2br(k.s4) + '</td><td>' + nl2br(k.s3) + '</td><td>' + nl2br(k.s2) + '</td><td>' + nl2br(k.s1) + '</td></tr>').join('') +
    '</tbody></table>' +
    '<p><b>Pedoman Penskoran:</b> ' + esc(r.petunjuk) + '</p>' +
    signBlockHtml('RUBRIK PENILAIAN - ' + r.judul);
}
function currentRubrik(){ return STATE.rubrikList.find(r => r.id === ACTIVE_RUBRIK_ID); }
function onRubrikChange(key, val){
  const r = currentRubrik(); if (!r) return;
  r[key] = val; save(); refreshPreview('rubrik-paper');
  if (key === 'judul'){
    const item = document.querySelector('#rubrik-list-items .list-item.active .list-item-title');
    if (item) item.textContent = val || 'Tanpa judul';
  }
}
function onKriteriaChange(id, key, val){
  const r = currentRubrik(); if (!r) return;
  const k = r.kriteria.find(x => x.id === id); if (!k) return;
  k[key] = val; save(); refreshPreview('rubrik-paper');
}
function addKriteria(){ const r = currentRubrik(); r.kriteria.push(emptyKriteria()); save(); renderView(); }
function delKriteria(id){ const r = currentRubrik(); r.kriteria = r.kriteria.filter(k => k.id !== id); save(); renderView(); }
function selectRubrik(id){ ACTIVE_RUBRIK_ID = id; renderView(); }
function addRubrik(){ const r = emptyRubrik(); STATE.rubrikList.push(r); ACTIVE_RUBRIK_ID = r.id; save(); renderView(); }
function delRubrik(id){
  STATE.rubrikList = STATE.rubrikList.filter(r => r.id !== id);
  if (STATE.rubrikList.length === 0) STATE.rubrikList.push(emptyRubrik());
  if (ACTIVE_RUBRIK_ID === id) ACTIVE_RUBRIK_ID = STATE.rubrikList[0].id;
  save(); renderView();
}
function duplicateRubrik(id){
  const src = STATE.rubrikList.find(r => r.id === id);
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uid(); copy.judul = src.judul + ' (Salinan)';
  copy.kriteria = copy.kriteria.map(k => Object.assign({}, k, { id: uid() }));
  STATE.rubrikList.push(copy); ACTIVE_RUBRIK_ID = copy.id; save(); renderView();
}

/* ============================== PREVIEW REFRESH (tanpa full re-render) ============================== */

function refreshPreview(paperId){
  const el = document.getElementById(paperId);
  if (!el) return;
  const map = {
    'kalender-paper': kalenderPaperHtml,
    'prota-paper': protaPaperHtml, 'promes-paper': () => promesPaperHtml(SEMESTER==='Ganjil'?BULAN_GANJIL:BULAN_GENAP),
    'modul-paper': () => modulPaperHtml(currentModul()), 'kktp-paper': kktpPaperHtml,
    'kisi-paper': kisiPaperHtml, 'rubrik-paper': () => rubrikPaperHtml(currentRubrik()),
  };
  if (map[paperId]) el.innerHTML = map[paperId]();
}

/* ============================== INIT ============================== */

load();
renderShell();
</script>
</body>
</html>
